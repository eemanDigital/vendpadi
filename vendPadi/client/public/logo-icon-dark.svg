<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25C866"/>
      <stop offset="100%" stop-color="#128C7E"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="40" cy="40" r="38" fill="url(#grad2)"/>
  
  <!-- V with Shopping Bag -->
  <g transform="translate(18, 15)">
    <!-- Shopping bag body -->
    <rect x="2" y="18" width="40" height="35" rx="6" fill="url(#grad1)"/>
    
    <!-- Bag handle -->
    <path d="M12 18 L12 12 Q22 0 32 12 L32 18" 
          fill="none" 
          stroke="url(#grad1)" 
          stroke-width="4" 
          stroke-linecap="round"/>
    
    <!-- V cut out -->
    <path d="M10 28 L22 48 L34 28" 
          fill="url(#grad2)"/>
    
    <!-- WhatsApp dots -->
    <circle cx="12" cy="36" r="3" fill="white" opacity="0.9"/>
    <circle cx="20" cy="36" r="3" fill="white" opacity="0.7"/>
    <circle cx="28" cy="36" r="3" fill="white" opacity="0.5"/>
  </g>
</svg>
