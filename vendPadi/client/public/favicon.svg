<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25C866"/>
      <stop offset="100%" stop-color="#128C7E"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="faviconShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  
  <!-- Shopping bag shape -->
  <g transform="translate(106, 80)" filter="url(#faviconShadow)">
    <!-- Bag body -->
    <rect width="300" height="280" rx="40" fill="white"/>
    
    <!-- Bag handle -->
    <path d="M80 0 L80 -20 Q150 -80 220 -20 L220 0" 
          fill="none" 
          stroke="white" 
          stroke-width="24" 
          stroke-linecap="round"/>
    
    <!-- V letter -->
    <path d="M80 60 L150 220 L220 60" 
          fill="none" 
          stroke="url(#bgGrad)" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- WhatsApp dots (bottom right) -->
    <circle cx="220" cy="200" r="16" fill="url(#bgGrad)" opacity="0.3"/>
    <circle cx="250" cy="180" r="12" fill="url(#bgGrad)" opacity="0.6"/>
    <circle cx="270" cy="160" r="8" fill="url(#bgGrad)"/>
  </g>
</svg>
