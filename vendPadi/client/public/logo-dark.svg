<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120">
  <defs>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25C866"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="darkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#25C866" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Icon: Shopping bag with V -->
  <g transform="translate(0, 10)">
    <g filter="url(#darkShadow)">
      <!-- Bag body -->
      <rect x="5" y="25" width="80" height="70" rx="16" fill="url(#darkGrad)"/>
      
      <!-- Bag handle -->
      <path d="M25 25 L25 10 Q45 -15 65 10 L65 25" 
            fill="none" 
            stroke="url(#darkGrad)" 
            stroke-width="8" 
            stroke-linecap="round"/>
      
      <!-- V cut out -->
      <path d="M20 40 L45 75 L70 40" 
            fill="#0f172a"/>
      
      <!-- Notification dot -->
      <circle cx="72" cy="30" r="10" fill="url(#darkGrad)"/>
      <circle cx="72" cy="30" r="5" fill="white"/>
    </g>
  </g>
  
  <!-- Text: Vend -->
  <text x="105" y="78" 
        font-family="'Sora', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="52" 
        font-weight="800" 
        fill="white"
        letter-spacing="-2">
    Vend
  </text>
  
  <!-- Text: Padi -->
  <text x="275" y="78" 
        font-family="'Sora', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="52" 
        font-weight="800" 
        fill="url(#darkGrad)"
        letter-spacing="-2">
    Padi
  </text>
  
  <!-- Subtitle -->
  <text x="108" y="105" 
        font-family="'Inter', -apple-system, sans-serif" 
        font-size="13" 
        font-weight="500" 
        fill="#64748b"
        letter-spacing="3">
    STORE BUILDER
  </text>
</svg>
